<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>JobHunter — Portal de Emprego em Portugal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2230%22 fill=%22url(%23grad)%22/><defs><linearGradient id=%22grad%22 x1=%220%25%22 y1=%220%25%22 x2=%22100%25%22 y2=%22100%25%22><stop offset=%220%25%22 style=%22stop-color:%233b82f6;stop-opacity:1%22 /><stop offset=%22100%25%22 style=%22stop-color:%238b5cf6;stop-opacity:1%22 /></linearGradient></defs><text x=%2250%25%22 y=%2268%25%22 font-size=%2250%22 font-family=%22Outfit,sans-serif%22 font-weight=%22800%22 fill=%22%23ffffff%22 text-anchor=%22middle%22>JH</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    // Bloquear clique direito (menu de contexto)
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    // Bloquear F12, Ctrl+U, Ctrl+Shift+I/J/C, Ctrl+S
    document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123) { // F12
        e.preventDefault();
        return false;
      }
      if (e.ctrlKey && e.keyCode === 85) { // Ctrl+U
        e.preventDefault();
        return false;
      }
      if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { // Ctrl+Shift+I/J/C
        e.preventDefault();
        return false;
      }
      if (e.ctrlKey && e.keyCode === 83) { // Ctrl+S
        e.preventDefault();
        return false;
      }
    });
  </script>
  <style>
    :root {
      --bg: #030712;
      --bg-surface: rgba(17, 24, 39, 0.7);
      --bg-elevated: rgba(31, 41, 55, 0.45);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-accent: rgba(59, 130, 246, 0.3);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --accent-soft: rgba(59, 130, 246, 0.12);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --text-dim: #6b7280;
      --success: #10b981;
      --success-soft: rgba(16, 185, 129, 0.12);
      --glow-pink: rgba(236, 72, 153, 0.15);
      --glow-purple: rgba(168, 85, 247, 0.15);
      --glow-blue: rgba(59, 130, 246, 0.15);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at 50% 0%, #0c142b 0%, #030712 60%, #000000 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(3, 7, 18, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-main);
    }
    
    .logo-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .logo-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #ffffff, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Glassmorphism Card Style */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 40px -10px rgba(0, 0, 0, 0.8);
    }

    /* Inputs y Forms */
    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"], select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: rgba(17, 24, 39, 0.5);
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
      background: rgba(17, 24, 39, 0.8);
    }

    /* Buttons */
    .btn {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 20px -6px rgba(124, 58, 237, 0.5);
      transition: all 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px -4px rgba(124, 58, 237, 0.6);
      background: linear-gradient(135deg, #1d4ed8, #6d28d9);
    }
    
    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--text-muted);
      box-shadow: none;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid transparent;
    }
    
    .badge-source {
      background: var(--accent-soft);
      border-color: rgba(59, 130, 246, 0.3);
      color: #60a5fa;
    }
    
    .badge-score {
      background: var(--success-soft);
      border-color: rgba(16, 185, 129, 0.3);
      color: #34d399;
    }

    footer {
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      border-top: 1px solid var(--border-color);
      background: rgba(3, 7, 18, 0.5);
      margin-top: auto;
    }

    /* Layout Grids */
    .layout-grid {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .layout-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-mark">JH</div>
        <div>
          <div class="logo-title">JobHunter</div>
          <div class="logo-sub">Multi‑fonte · Tempo real · Inteligência Artificial</div>
        </div>
      </a>
    </div>
  </header>
  
  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>&copy; 2026 JobHunter Portugal. Desenvolvido para agregar as melhores ofertas do mercado nacional.</p>
  </footer>
</body>
</html>
